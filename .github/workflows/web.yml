name: Build & Deploy Web (WASM)

on:
  push:
    branches: [main]
  workflow_dispatch:

# FIX: Explicit permissions required for peaceiris/actions-gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'

      - name: Configure & Build
        run: |
          mkdir -p build_web
          cd build_web
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          emmake make -j$(nproc)

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp build_web/craftsprint.js   dist/
          cp build_web/craftsprint.wasm dist/
          cp platform/web/index.html    dist/
          cp platform/web/game.html     dist/
          cp platform/web/settings.html dist/
          cp platform/web/about.html    dist/
          cp platform/web/style.css     dist/
          cp platform/web/main.js       dist/
          cp -r assets                  dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
