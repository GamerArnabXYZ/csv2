name: Build & Sign Android (Always Release)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      # Include Root Assets
      - name: Sync Root Assets to Android
        run: |
          mkdir -p platform/android/app/src/main/assets
          cp -r assets/* platform/android/app/src/main/assets/

      - name: Create Gradle Wrapper
        run: |
          cd platform/android
          gradle wrapper --gradle-version=8.2

      # Generate Signed Release APKs
      - name: Build Signed Release APKs
        run: |
          cd platform/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # Rename APKs for clarity
      - name: Prepare APKs for Upload
        run: |
          mkdir -p release-apks
          find platform/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} release-apks/ \;
          cd release-apks
          for f in *.apk; do mv "$f" "CraftSprint_${f#app-}"; done

      # Delete ALL old releases and tags to keep only the latest
      - name: Delete Old Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 0
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload to 'Latest' Release
      - name: Update Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (Auto-Signed)"
          files: release-apks/*.apk
          body: "This release is automatically updated on every push. All old releases have been removed."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
